<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <title>Ascend</title>

</head>

<body>

<main class="app">

<header>

<h1>ASCEND</h1>

<h2 id="greeting">Welcome.</h2>

<p class="tagline">
Every journey begins with one step.
</p>

</header>

<section class="card" id="onboarding">

<h2>Let's get started.</h2>

<input
type="text"
id="usernameInput"
placeholder="What should we call you?"
>

<button class="primary-btn" id="saveUser">
Begin Journey
</button>

</section>

<section class="card">

<div class="level-header">

<div class="level-title">
LEVEL 1
</div>

<div class="level-xp" id="xpText">
120 / 1000 XP
</div>

</div>

<div class="progress">
<div class="progress-fill"></div>
</div>

</section>

<section class="card">

<h2>Today's Quests</h2>

<div class="quest">

<div>
<h3>💧 Drink 2L Water</h3>
<p>+25 XP</p>
</div>

<button
class="quest-btn"
data-xp="25">
Complete
</button>

</div>

<div class="quest">

<div>
<h3>📖 Read 10 Pages</h3>
<p>+40 XP</p>
</div>

<button
class="quest-btn"
data-xp="40">
Complete
</button>

</div>

<div class="quest">

<div>
<h3>🚶 Walk 30 Minutes</h3>
<p>+35 XP</p>
</div>

<button
class="quest-btn"
data-xp="35">
Complete
</button>

</div>

</section>

</main>

<script src="js/script.js"></script>

</body>

</html>
